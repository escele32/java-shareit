services:
  db:
    image: postgres:16.1
    container_name: shareit
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: shareit
      POSTGRES_USER: shareitName
      POSTGRES_PASSWORD: shareitPass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d shareit -U shareitName"]
      timeout: 5s
      interval: 5s
      retries: 10
volumes:
  pg_data: